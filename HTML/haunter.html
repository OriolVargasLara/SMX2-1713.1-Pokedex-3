<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokédex - Haunter</title>
    <link rel="icon" type="image/png" href="../imágenes/pokeball.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../CSS/estilos.css">
</head>
<body class="view-pokemon">

    <div class="pokemon-container">
        <header class="pokemon-header">
            <div class="caja-nombre">
                <h1>Haunter</h1>
            </div>
            <span class="pokedex-number">#093</span>
        </header>

        <main class="info-principal">
            <div class="sprite-container">
                <img src="../imágenes/haunter.png" alt="Haunter" class="pokemon-sprite">
            </div>
            
            <div class="detalles">
                <div class="tipo-container">
                    <p>TIPO</p>
                    <div class="flex-tipos">
                        <span class="badge fantasma">FANTASMA</span>
                        <span class="badge veneno">VENENO</span>
                    </div>
                </div>
                <div class="descripcion">
                    <p>DESCRIPCIÓN</p>
                    <p class="texto-pixel">Puede atravesar muros, por lo que muchos creen que viene de otra dimensión. Si te lame con su lengua gaseosa, te provocará temblores hasta que mueras.</p>
                </div>
            </div>
        </main>

        <section class="evoluciones">
            <h3>LÍNEA EVOLUTIVA</h3>
            <div class="flex-evos">
                <a href="gastly.html" class="evo-link">
                    <img src="../imágenes/gastly.png" alt="Gastly">
                    <p>Gastly</p>
                </a>
                <a href="gengar.html" class="evo-link">
                    <img src="../imágenes/gengar.png" alt="Gengar">
                    <p>Gengar</p>
                </a>
            </div>
        </section>

        <footer>
            <a href="index.html" class="btn-volver">VOLVER AL INICIO</a>
        </footer>
    </div>

</body>
</html>
