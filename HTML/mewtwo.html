<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokédex - Mewtwo</title>
    <link rel="icon" type="image/png" href="../imágenes/pokeball.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../CSS/estilos.css">
</head>
<body class="view-pokemon">

    <div class="pokemon-container">
        <header class="pokemon-header">
            <div class="caja-nombre">
                <h1>Mewtwo</h1>
            </div>
            <span class="pokedex-number">#150</span>
        </header>

        <main class="info-principal">
            <div class="sprite-container">
                <img src="../imágenes/mewtwo.png" alt="Mewtwo" class="pokemon-sprite">
            </div>
            
            <div class="detalles">
                <div class="tipo-container">
                    <p>TIPO</p>
                    <div class="flex-tipos">
                        <span class="badge psiquico">PSÍQUICO</span>
                    </div>
                </div>
                <div class="descripcion">
                    <p>DESCRIPCIÓN</p>
                    <p class="texto-pixel">Fue creado por un científico tras años de horribles experimentos de ingeniería genética. Es el Pokémon más salvaje de todos.</p>
                </div>
            </div>
        </main>
                <section class="evoluciones">
            <h3>VÉASE TAMBIÉN</h3>
            <div class="flex-evos">
                <div class="evo-link">
                <a href="mew.html" class="evo-link">
                    <img src="../imágenes/mew.png" alt="Mew">
                    <p>Mew</p>
                </div>
            </div>
        </section>

        <footer>
            <a href="../index.html" class="btn-volver">VOLVER AL INICIO</a>
        </footer>
    </div>

</body>
</html>
