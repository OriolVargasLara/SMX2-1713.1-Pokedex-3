<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokédex - Quilava</title>
    <link rel="icon" type="image/png" href="../imágenes/pokeball.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../CSS/estilos.css">
</head>
<body class="view-pokemon">

    <div class="pokemon-container">
        <header class="pokemon-header">
            <div class="caja-nombre">
                <h1>Quilava</h1>
            </div>
            <span class="pokedex-number">#156</span>
        </header>

        <main class="info-principal">
            <div class="sprite-container">
                <img src="../imágenes/quilava.png" alt="Quilava" class="pokemon-sprite">
            </div>
            
            <div class="detalles">
                <div class="tipo-container">
                    <p>TIPO</p>
                    <span class="badge fuego">FUEGO</span>
                </div>
                <div class="descripcion">
                    <p>DESCRIPCIÓN</p>
                    <p class="texto-pixel">Intimida a sus enemigos con la intensidad de sus llamas y ráfagas de aire caliente. Si se prepara para luchar, el fuego de su lomo arde con más fuerza.</p>
                </div>
            </div>
        </main>

        <section class="evoluciones">
            <h3>EVOLUCIONES</h3>
            <div class="flex-evos">
                <a href="cyndaquil.html" class="evo-link active">
                    <img src="../imágenes/cyndaquil.png" alt="Cyndaquil">
                    <p>Cyndaquil</p>
                </a>

                <a href="typhlosion.html" class="evo-link">
                    <img src="../imágenes/typhlosion.png" alt="Typhlosion">
                    <p>Typhlosion</p>
                </a>

                <a href="typhlosion-hisui.html" class="evo-link">
                    <img src="../imágenes/typhlosion-hisui.png" alt="Typhlosion Hisui">
                    <p>T. Hisui</p>
                </a>
            </div>
        </section>

        <footer>
            <a href="index.html" class="btn-volver">VOLVER AL MAPA</a>
        </footer>
    </div>

</body>
</html>
