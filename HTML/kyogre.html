<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokédex - Kyogre</title>
    <link rel="icon" type="image/png" href="../imágenes/pokeball.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../CSS/estilos.css">
</head>
<body class="view-pokemon">

    <div class="pokemon-container">
        <header class="pokemon-header">
            <div class="caja-nombre">
                <h1>Kyogre</h1>
            </div>
            <span class="pokedex-number">#382</span>
        </header>

        <main class="info-principal">
            <div class="sprite-container">
                <img src="../imágenes/kyogre.png" alt="Kyogre" class="pokemon-sprite">
            </div>
            
            <div class="detalles">
                <div class="tipo-container">
                    <p>TIPO</p>
                    <div class="flex-tipos">
                        <span class="badge agua">AGUA</span>
                    </div>
                </div>
                <div class="descripcion">
                    <p>DESCRIPCIÓN</p>
                    <p class="texto-pixel">Kyogre tiene el poder de crear grandes nubes pluviales que cubren todo el cielo y desatan lluvias torrenciales. Se dice que salvó a gente de la sequía.</p>
                </div>
            </div>
        </main>

        <section class="evoluciones">
            <h3>VÉASE TAMBIÉN</h3>
            <div class="flex-evos">
                <a href="rayquaza.html" class="evo-link">
                    <img src="../imágenes/rayquaza.png" alt="Rayquaza">
                    <p>Rayquaza</p>
                </a>

                <a href="groudon.html" class="evo-link">
                    <img src="../imágenes/groudon.png" alt="Groudon">
                    <p>Groudon</p>
                </a>
            </div>
        </section>

        <footer>
            <a href="index.html" class="btn-volver">VOLVER AL INICIO</a>
        </footer>
    </div>

</body>
</html>
